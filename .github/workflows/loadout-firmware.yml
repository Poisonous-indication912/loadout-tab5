name: Build LOADOUT firmware

# Compila el firmware de la Tab5 y publica una Release con:
#   - loadout-tab5.bin   (imagen de app para OTA)
#   - latest.json        (manifest que lee el dispositivo)
# Dispara al hacer push de un tag vX.Y.Z (ej. git tag v1.1.0 && git push --tags).
# Tambien se puede lanzar a mano (workflow_dispatch) para una build de prueba.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # para crear la Release

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          . "$IDF_PATH/export.sh"

          # Dependencias externas (LVGL/mooncake/smooth_ui_toolkit) -> dependencies/.
          # No se versionan en el repo; las clona este script (las usa
          # EXTRA_COMPONENT_DIRS=../../dependencies del proyecto tab5).
          python "$GITHUB_WORKSPACE/fetch_repos.py"

          # Version: del tag (v1.2.0 -> 1.2.0) o 0.0.0-dev en pruebas manuales.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.0.0-dev"
          fi
          echo "VER=$VER" >> "$GITHUB_ENV"
          printf '#pragma once\n#define LOADOUT_VERSION "%s"\n' "$VER" \
            > platforms/tab5/main/loadout_version.h

          cd platforms/tab5
          idf.py build

          cp build/m5stack_tab5.bin ../../loadout-tab5.bin
          cat > ../../latest.json <<EOF
          {
            "version": "$VER",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/loadout-tab5.bin",
            "notes": "LOADOUT $VER"
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loadout-${{ env.VER }}
          path: |
            loadout-tab5.bin
            latest.json

      - name: Publish Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: LOADOUT ${{ env.VER }}
          tag_name: ${{ github.ref_name }}
          files: |
            loadout-tab5.bin
            latest.json
